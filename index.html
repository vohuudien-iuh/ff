<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ác Quỷ Free Fire 👿</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#050508;--sur:#0d0d14;--sur2:#13131e;--bdr:#2a2a45;--bdr2:#3d3d66;--red:#ff2d2d;--orange:#ff6a00;--yellow:#ffd700;--purple:#9d4edd;--pink:#ff006e;--blue:#00b4d8;--txt:#f0f0ff;--dim:#9090b8;--muted:#444466}
body{font-family:'Be Vietnam Pro',system-ui,sans-serif;background:var(--bg);color:var(--txt);min-height:100vh;overflow-x:hidden}
.particles{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.particle{position:absolute;border-radius:50%;animation:rise var(--d,6s) linear var(--delay,0s) infinite;opacity:0}
@keyframes rise{0%{transform:translateY(100vh) scale(0);opacity:0}10%{opacity:.8}90%{opacity:.3}100%{transform:translateY(-20px) scale(1.5);opacity:0}}
.header{position:relative;z-index:1;text-align:center;padding:50px 20px 36px;overflow:hidden}
.header-bg{position:absolute;inset:0;background:radial-gradient(ellipse at 50% 100%,rgba(255,69,0,.1) 0%,transparent 65%);pointer-events:none}
.logo{font-size:5rem;filter:drop-shadow(0 0 20px rgba(255,69,0,.6));animation:flicker 3s ease-in-out infinite;display:inline-block;margin-bottom:14px}
@keyframes flicker{0%,100%{filter:drop-shadow(0 0 20px rgba(255,69,0,.6))}50%{filter:drop-shadow(0 0 40px rgba(255,140,0,.9)) drop-shadow(0 0 70px rgba(255,69,0,.4))}}
h1{font-family:'Be Vietnam Pro',sans-serif;font-size:clamp(2rem,8vw,3.6rem);font-weight:800;letter-spacing:.02em;line-height:1;background:linear-gradient(135deg,#ff4500,#ff8c00,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;filter:drop-shadow(0 0 20px rgba(255,100,0,.4));margin-bottom:6px}
.divider{position:relative;z-index:1;height:2px;background:linear-gradient(90deg,transparent,#ff4500,#ff8c00,#ff4500,transparent);box-shadow:0 0 14px rgba(255,69,0,.5)}
.main{position:relative;z-index:1;max-width:800px;margin:0 auto;padding:40px 16px 60px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
@media(max-width:540px){.grid{grid-template-columns:1fr;max-width:280px;margin:0 auto}}
.card{background:var(--sur);border:1px solid var(--bdr);border-radius:18px;overflow:hidden;cursor:pointer;transition:all .25s;position:relative}
.card:hover{border-color:#ff4500;transform:translateY(-5px);box-shadow:0 14px 36px rgba(255,69,0,.18)}
.card-img-wrap{position:relative;overflow:hidden}
.card-img{width:100%;aspect-ratio:1;object-fit:cover;background:var(--sur2);display:block;transition:transform .3s}
.card:hover .card-img{transform:scale(1.06)}
.card-img-ph{width:100%;aspect-ratio:1;background:linear-gradient(135deg,#13131e,#1a1a2e);display:flex;align-items:center;justify-content:center;font-size:4rem}
.card-glow{position:absolute;bottom:0;left:0;right:0;height:30%;background:linear-gradient(transparent,rgba(5,5,8,.8))}
.card-body{padding:14px 13px 15px;text-align:center}
.card-name{font-size:1rem;font-weight:800;letter-spacing:.02em;margin-bottom:3px}
.card-role{display:inline-block;font-size:.62rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:2px 10px;border-radius:100px}
.r-owner{background:rgba(255,215,0,.12);color:var(--yellow);border:1px solid rgba(255,215,0,.3)}
.r-admin{background:rgba(255,106,0,.12);color:#ff8c00;border:1px solid rgba(255,106,0,.3)}
.r-member{background:rgba(157,78,221,.1);color:var(--purple);border:1px solid rgba(157,78,221,.25)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:100;display:flex;align-items:center;justify-content:center;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s;backdrop-filter:blur(6px)}
.modal-overlay.open{opacity:1;pointer-events:all}
.modal{background:var(--sur);border:1px solid var(--bdr2);border-radius:22px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;transform:scale(.94) translateY(10px);transition:transform .25s}
.modal-overlay.open .modal{transform:scale(1) translateY(0)}
.modal-img-wrap{position:relative;height:260px;overflow:hidden;border-radius:22px 22px 0 0}
.modal-img-wrap img,.modal-img-wrap .ph{width:100%;height:100%;object-fit:cover;object-position:top;background:var(--sur2)}
.modal-img-wrap .ph{display:flex;align-items:center;justify-content:center;font-size:5rem}
.modal-img-grad{position:absolute;bottom:0;left:0;right:0;height:30px;background:linear-gradient(transparent,var(--sur))}
.modal-body{padding:20px}
.modal-name{font-size:1.3rem;font-weight:800;margin-bottom:4px}
.modal-role-wrap{margin-bottom:14px}
.fire-line{height:2px;background:linear-gradient(90deg,#ff4500,var(--purple),transparent);border-radius:100px;margin-bottom:16px}
.modal-label{font-size:.65rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.1em;margin-bottom:5px}
.modal-text{font-size:.82rem;color:var(--dim);line-height:1.7;margin-bottom:14px}
.modal-fb{display:inline-flex;align-items:center;gap:7px;background:rgba(24,119,242,.1);border:1px solid rgba(24,119,242,.3);border-radius:10px;padding:9px 18px;font-size:.8rem;font-weight:700;color:#4a9eff;text-decoration:none;transition:all .2s}
.modal-fb:hover{background:rgba(24,119,242,.2);border-color:#4a9eff;transform:translateY(-1px)}
.close-btn{position:absolute;top:13px;right:13px;background:rgba(0,0,0,.65);border:1px solid var(--bdr);border-radius:100px;width:34px;height:34px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:.9rem;color:var(--dim);transition:all .2s;backdrop-filter:blur(4px);z-index:2}
.close-btn:hover{background:var(--bdr2);color:var(--txt)}
footer{position:relative;z-index:1;text-align:center;padding:20px;font-size:.67rem;color:var(--muted);border-top:1px solid var(--bdr)}
</style>
</head>
<body>
<div class="particles" id="particles"></div>
<div class="header">
  <div class="header-bg"></div>
  <div class="logo">👿</div>
  <h1>Ác Quỷ Free Fire</h1>
</div>
<div class="divider"></div>
<div class="main">
  <div class="grid" id="grid"></div>
</div>
<div class="modal-overlay" id="overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div id="modalContent"></div>
  </div>
</div>
<footer>Đắc Lớp</footer>
<script>
var members=[
  {id:1,name:"Thầy Milk",role:"owner",avatar:"milk.jpg",bio:"Thầy giáo tương lai",fb:"https://www.facebook.com/huynh.tram.565294"},
  {id:2,name:"Giang VT",role:"admin",avatar:"giang.jpg",bio:"Chuẩn bị ra khơi",fb:"https://www.facebook.com/vt.giang.79"},
  {id:3,name:"Bảo",role:"member",avatar:"bao.jpg",bio:"Ác quỷ Free Fire",fb:"https://www.facebook.com/huynh.van.bao.777870"}
];
var roleLabel={owner:"500k/đêm",admin:"200k/đêm",member:"100k/đêm"};
var roleClass={owner:"r-owner",admin:"r-admin",member:"r-member"};
var pc=document.getElementById('particles');
var colors=['#ff4500','#ff8c00','#ffd700','#9d4edd','#ff006e'];
for(var i=0;i<35;i++){
  var p=document.createElement('div');p.className='particle';
  p.style.left=Math.random()*100+'%';
  p.style.background=colors[Math.floor(Math.random()*colors.length)];
  var size=(1+Math.random()*3)+'px';p.style.width=size;p.style.height=size;
  p.style.setProperty('--d',(5+Math.random()*8)+'s');
  p.style.setProperty('--delay',(-Math.random()*8)+'s');
  pc.appendChild(p);
}
document.getElementById('grid').innerHTML=members.map(function(m){
  var imgHtml=m.avatar
    ?'<img class="card-img" src="'+m.avatar+'" alt="'+m.name+'" loading="lazy" onerror="this.parentNode.innerHTML=\'<div class=card-img-ph>👿</div>\'">'
    :'<div class="card-img-ph">👿</div>';
  return '<div class="card" onclick="openModal('+m.id+')">'
    +'<div class="card-img-wrap">'+imgHtml+'<div class="card-glow"></div></div>'
    +'<div class="card-body">'
    +'<div class="card-name">'+m.name+'</div>'
    +'<span class="card-role '+roleClass[m.role]+'">'+roleLabel[m.role]+'</span>'
    +'</div></div>';
}).join('');
function openModal(id){
  var m=members.filter(function(x){return x.id===id;})[0];
  if(!m)return;
  var imgHtml=m.avatar?'<img src="'+m.avatar+'" alt="'+m.name+'">':'<div class="ph">👿</div>';
  document.getElementById('modalContent').innerHTML=
    '<button class="close-btn" onclick="closeModal()">✕</button>'
    +'<div class="modal-img-wrap">'+imgHtml+'<div class="modal-img-grad"></div></div>'
    +'<div class="modal-body">'
    +'<div class="modal-name">'+m.name+'</div>'
    +'<div class="modal-role-wrap"><span class="card-role '+roleClass[m.role]+'">'+roleLabel[m.role]+'</span></div>'
    +'<div class="fire-line"></div>'
    +'<div class="modal-label">⚡ Giới thiệu</div>'
    +'<div class="modal-text">'+m.bio+'</div>'
    +(m.fb?'<div class="modal-label">🔗 Liên hệ</div><a class="modal-fb" href="'+m.fb+'" target="_blank">📘 Facebook</a>':'')
    +'</div>';
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(e){
  if(e&&e.target!==document.getElementById('overlay'))return;
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow='';
}
document.addEventListener('keydown',function(e){if(e.key==='Escape')closeModal();});
</script>
</body>
</html>
